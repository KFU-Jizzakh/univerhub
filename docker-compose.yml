services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: univerhub
      POSTGRES_PASSWORD: ${UNIVERHUB_DATABASE_PASSWORD}
      POSTGRES_DB: univerhub_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U univerhub -d univerhub_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - univerhub_storage:/rails/storage
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      PGHOST: db
      UNIVERHUB_DATABASE_PASSWORD: ${UNIVERHUB_DATABASE_PASSWORD}
      SOLID_QUEUE_IN_PUMA: "true"
    command: ["./bin/thrust", "./bin/rails", "server"]

volumes:
  postgres_data:
  univerhub_storage:
